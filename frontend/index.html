<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Estudiantes</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="contenedor">
    <header>
      <h1>Registro de Estudiantes ULEAM</h1>
      <p class="subtitulo">FastAPI en AWS + Frontend en Cloud Run + CI/CD con GitHub Actions</p>
    </header>

    <section class="tarjeta">
      <h2>Nuevo registro</h2>
      <form id="formulario">
        <div class="campo">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" required minlength="2" maxlength="100" placeholder="Ej. Ana Pérez">
        </div>
        <div class="campo">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo" required placeholder="ana@ejemplo.com">
        </div>
        <div class="fila">
          <div class="campo">
            <label for="carrera">Carrera</label>
            <input type="text" id="carrera" name="carrera" required minlength="2" maxlength="100" placeholder="Ing. de Software">
          </div>
          <div class="campo">
            <label for="semestre">Semestre</label>
            <input type="number" id="semestre" name="semestre" required min="1" max="12" placeholder="5">
          </div>
        </div>
        <button type="submit" id="btn-enviar">Registrar</button>
        <p id="mensaje" class="mensaje oculto"></p>
      </form>
    </section>

    <section class="tarjeta">
      <h2>Estudiantes registrados</h2>
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Carrera</th>
            <th>Sem.</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="lista-estudiantes">
          <tr><td colspan="5" class="vacio">Cargando…</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
