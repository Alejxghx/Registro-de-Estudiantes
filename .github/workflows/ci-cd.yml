name: CI/CD - Deploy en AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pruebas:
    name: Pruebas (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas
        run: pytest -v

  desplegar-backend:
    name: Despliegue del backend en AWS EC2 (CD)
    needs: pruebas
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar por SSH en EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Registro-de-Estudiantes
            git pull origin main
            source .venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart registro-estudiantes

  desplegar-frontend:
    name: Despliegue del frontend en Cloud Run (CD)
    needs: pruebas
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Autenticarse en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Desplegar en Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: registro-frontend
          region: us-central1
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          source: ./frontend
          flags: --allow-unauthenticated
